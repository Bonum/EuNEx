version: '3.8'

services:
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 4
      KAFKA_CFG_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-init:
    image: bitnami/kafka:3.7
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic eunex.recovery.fragments --partitions 4 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic eunex.trades --partitions 4 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic eunex.market-data --partitions 4 --replication-factor 1
        echo "Topics created."

  eunex:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      EUNEX_KAFKA_BROKERS: kafka:9092
    ports:
      - "8080:8080"

volumes:
  kafka_data:

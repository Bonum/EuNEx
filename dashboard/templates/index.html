<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EuNEx Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0e17; color: #c8d6e5; font-size: 13px; }

.header { background: #141b2d; padding: 8px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1e2a3a; }
.header h1 { font-size: 16px; color: #4fc3f7; font-weight: 600; }
.header .status { display: flex; align-items: center; gap: 8px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #666; }
.status-dot.active { background: #4caf50; animation: pulse 2s infinite; }
.status-dot.suspended { background: #ff9800; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

.controls { display: flex; gap: 6px; }
.btn { padding: 4px 12px; border: 1px solid #2a3a4a; border-radius: 3px; background: #1a2332; color: #c8d6e5; cursor: pointer; font-size: 12px; }
.btn:hover { background: #243447; }
.btn.buy { border-color: #2e7d32; color: #66bb6a; }
.btn.sell { border-color: #c62828; color: #ef5350; }
.btn.active-btn { background: #1b5e20; border-color: #4caf50; }

.grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr 1fr; gap: 8px; padding: 8px; height: calc(100vh - 44px); }

.panel { background: #141b2d; border: 1px solid #1e2a3a; border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; }
.panel-header { padding: 6px 10px; background: #1a2332; border-bottom: 1px solid #1e2a3a; font-size: 12px; font-weight: 600; color: #4fc3f7; display: flex; justify-content: space-between; align-items: center; }
.panel-body { flex: 1; overflow-y: auto; padding: 4px; }

.order-form { grid-column: 1 / -1; }
.order-form .panel-body { display: flex; gap: 8px; padding: 8px; flex-wrap: wrap; align-items: center; }
.order-form select, .order-form input { padding: 4px 8px; background: #0a0e17; border: 1px solid #2a3a4a; color: #c8d6e5; border-radius: 3px; font-size: 12px; }
.order-form input { width: 80px; }
.order-form label { font-size: 11px; color: #8899aa; margin-right: 2px; }

table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 3px 6px; color: #8899aa; font-size: 11px; font-weight: 500; border-bottom: 1px solid #1e2a3a; position: sticky; top: 0; background: #141b2d; }
td { padding: 3px 6px; border-bottom: 1px solid #0e1525; font-size: 12px; }
tr:hover { background: #1a2332; }

.price-bid { color: #66bb6a; }
.price-ask { color: #ef5350; }
.price-neutral { color: #c8d6e5; }

.book-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; height: 100%; }
.book-side { overflow-y: auto; }
.book-side h3 { font-size: 11px; color: #8899aa; padding: 4px 6px; text-align: center; }

.bar { height: 18px; display: flex; align-items: center; padding: 0 4px; font-size: 11px; margin: 1px 2px; border-radius: 2px; }
.bar-bid { background: rgba(76, 175, 80, 0.15); justify-content: flex-end; text-align: right; }
.bar-ask { background: rgba(239, 83, 80, 0.12); }
.bar-fill { position: absolute; top: 0; bottom: 0; opacity: 0.2; border-radius: 2px; }

.ticker { display: flex; gap: 16px; overflow-x: auto; padding: 6px 10px; white-space: nowrap; }
.ticker-item { display: flex; gap: 6px; align-items: center; }
.ticker-sym { font-weight: 600; color: #4fc3f7; }
.ticker-up { color: #66bb6a; }
.ticker-down { color: #ef5350; }

.stat-row { display: flex; justify-content: space-between; padding: 3px 8px; }
.stat-label { color: #8899aa; }
.stat-value { font-weight: 500; }

.flash { animation: flash-bg 0.5s; }
@keyframes flash-bg { 0% { background: rgba(79, 195, 247, 0.2); } 100% { background: transparent; } }

.tag { font-size: 10px; padding: 1px 4px; border-radius: 2px; }
.tag-equ { background: #1b5e20; color: #a5d6a7; }
.tag-eqd { background: #4a148c; color: #ce93d8; }
</style>
</head>
<body>

<div class="header">
    <h1>EuNEx Matching Engine</h1>
    <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Disconnected</span>
    </div>
    <div class="controls">
        <button class="btn" onclick="sessionAction('start')">Start Day</button>
        <button class="btn" onclick="sessionAction('suspend')">Suspend</button>
        <button class="btn" onclick="sessionAction('resume')">Resume</button>
        <button class="btn" onclick="sessionAction('end')">End Day</button>
    </div>
</div>

<div class="grid">
    <!-- Order Entry -->
    <div class="panel order-form">
        <div class="panel-header">Order Entry</div>
        <div class="panel-body">
            <label>Symbol</label>
            <select id="fSymbol">
                <option value="1">AAPL (EQU)</option>
                <option value="2">MSFT (EQU)</option>
                <option value="3">EURO50 (EQD)</option>
            </select>
            <label>Side</label>
            <select id="fSide">
                <option value="Buy">Buy</option>
                <option value="Sell">Sell</option>
            </select>
            <label>Type</label>
            <select id="fType">
                <option value="Limit">Limit</option>
                <option value="Market">Market</option>
            </select>
            <label>TIF</label>
            <select id="fTif">
                <option value="Day">Day</option>
                <option value="IOC">IOC</option>
                <option value="FOK">FOK</option>
            </select>
            <label>Price</label>
            <input type="number" id="fPrice" step="0.01" value="150.00">
            <label>Qty</label>
            <input type="number" id="fQty" step="1" value="100">
            <button class="btn buy" onclick="submitOrder('Buy')">BUY</button>
            <button class="btn sell" onclick="submitOrder('Sell')">SELL</button>
        </div>
    </div>

    <!-- Order Book -->
    <div class="panel">
        <div class="panel-header">
            Order Book
            <select id="bookSymbol" onchange="refreshBook()" style="background:#0a0e17;border:1px solid #2a3a4a;color:#c8d6e5;font-size:11px;padding:2px;">
                <option value="1">AAPL</option>
                <option value="2">MSFT</option>
                <option value="3">EURO50</option>
            </select>
        </div>
        <div class="panel-body">
            <div class="book-grid">
                <div class="book-side" id="bookBids">
                    <h3>BIDS</h3>
                </div>
                <div class="book-side" id="bookAsks">
                    <h3>ASKS</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- Market Snapshot -->
    <div class="panel">
        <div class="panel-header">Market Snapshot (BBO)</div>
        <div class="panel-body">
            <div class="ticker" id="ticker"></div>
            <table>
                <thead><tr><th>Symbol</th><th>Seg</th><th>Bid</th><th>Ask</th><th>Last</th><th>Vol</th><th>Trades</th></tr></thead>
                <tbody id="snapshotTable"></tbody>
            </table>
        </div>
    </div>

    <!-- Orders -->
    <div class="panel">
        <div class="panel-header">
            Active Orders
            <span id="orderCount" style="color:#8899aa;font-weight:400;">0</span>
        </div>
        <div class="panel-body">
            <table>
                <thead><tr><th>ID</th><th>Sym</th><th>Side</th><th>Type</th><th>Price</th><th>Qty</th><th>Rem</th><th>Status</th><th></th></tr></thead>
                <tbody id="ordersTable"></tbody>
            </table>
        </div>
    </div>

    <!-- Trades -->
    <div class="panel">
        <div class="panel-header">
            Recent Trades
            <span id="tradeCount" style="color:#8899aa;font-weight:400;">0</span>
        </div>
        <div class="panel-body">
            <table>
                <thead><tr><th>ID</th><th>Symbol</th><th>Price</th><th>Qty</th><th>Buy OID</th><th>Sell OID</th><th>Time</th></tr></thead>
                <tbody id="tradesTable"></tbody>
            </table>
        </div>
    </div>

    <!-- Statistics -->
    <div class="panel">
        <div class="panel-header">Trading Statistics</div>
        <div class="panel-body" id="statsPanel">
        </div>
    </div>
</div>

<script>
const API = '';
let evtSource = null;

function fmt(v, dec=2) {
    return v ? Number(v).toFixed(dec) : '-';
}

function ts(epoch) {
    if (!epoch) return '-';
    const d = new Date(epoch * 1000);
    return d.toLocaleTimeString();
}

// ── SSE Connection ─────────────────────────────────────────────────

function connect() {
    if (evtSource) evtSource.close();
    evtSource = new EventSource(API + '/stream');

    evtSource.onopen = () => {
        document.getElementById('statusDot').className = 'status-dot active';
        document.getElementById('statusText').textContent = 'Connected';
    };
    evtSource.onerror = () => {
        document.getElementById('statusDot').className = 'status-dot';
        document.getElementById('statusText').textContent = 'Disconnected';
        setTimeout(connect, 3000);
    };

    evtSource.addEventListener('order', e => {
        refreshData();
    });
    evtSource.addEventListener('trade', e => {
        refreshData();
    });
    evtSource.addEventListener('snapshot', e => {
        refreshData();
    });
    evtSource.addEventListener('session', e => {
        const d = JSON.parse(e.data);
        updateSessionStatus(d.status);
    });
}

function updateSessionStatus(status) {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot ' + (status === 'active' ? 'active' : status === 'suspended' ? 'suspended' : '');
}

// ── Data Refresh ───────────────────────────────────────────────────

async function refreshData() {
    try {
        const res = await fetch(API + '/data');
        const data = await res.json();
        renderOrders(data.orders);
        renderTrades(data.trades);
        renderSnapshots(data.snapshots);
        renderStats(data.snapshots);
        renderTicker(data.snapshots);
        refreshBook();
    } catch(e) {}
}

function renderOrders(list) {
    const active = list.filter(o => o.status === 'New' || o.status === 'PartiallyFilled');
    document.getElementById('orderCount').textContent = active.length;
    const tbody = document.getElementById('ordersTable');
    tbody.innerHTML = list.slice(-30).reverse().map(o => {
        const sideClass = o.side === 'Buy' ? 'price-bid' : 'price-ask';
        const canCancel = o.status === 'New' || o.status === 'PartiallyFilled';
        return `<tr>
            <td>${o.orderId}</td>
            <td>${o.symbol}</td>
            <td class="${sideClass}">${o.side}</td>
            <td>${o.orderType}</td>
            <td>${fmt(o.price)}</td>
            <td>${o.quantity}</td>
            <td>${o.remainingQty}</td>
            <td>${o.status}</td>
            <td>${canCancel ? `<button class="btn" onclick="cancelOrder(${o.orderId})" style="padding:1px 6px;font-size:10px;">X</button>` : ''}</td>
        </tr>`;
    }).join('');
}

function renderTrades(list) {
    document.getElementById('tradeCount').textContent = list.length;
    const tbody = document.getElementById('tradesTable');
    tbody.innerHTML = list.slice(-30).reverse().map(t => `<tr>
        <td>${t.tradeId}</td>
        <td>${t.symbol}</td>
        <td class="price-neutral">${fmt(t.price)}</td>
        <td>${t.quantity}</td>
        <td>${t.buyOrderId}</td>
        <td>${t.sellOrderId}</td>
        <td>${ts(t.timestamp)}</td>
    </tr>`).join('');
}

function renderSnapshots(snaps) {
    const tbody = document.getElementById('snapshotTable');
    tbody.innerHTML = Object.values(snaps).map(s => {
        const segClass = s.segment === 'EQU' ? 'tag-equ' : 'tag-eqd';
        return `<tr>
            <td><b>${s.symbol}</b></td>
            <td><span class="tag ${segClass}">${s.segment}</span></td>
            <td class="price-bid">${fmt(s.bestBid)}</td>
            <td class="price-ask">${fmt(s.bestAsk)}</td>
            <td>${fmt(s.lastPrice)}</td>
            <td>${s.volume || 0}</td>
            <td>${s.tradeCount}</td>
        </tr>`;
    }).join('');
}

function renderTicker(snaps) {
    const ticker = document.getElementById('ticker');
    ticker.innerHTML = Object.values(snaps).map(s => {
        const cls = s.lastPrice > 0 ? 'ticker-up' : 'price-neutral';
        return `<div class="ticker-item">
            <span class="ticker-sym">${s.symbol}</span>
            <span class="${cls}">${fmt(s.lastPrice)}</span>
        </div>`;
    }).join('');
}

function renderStats(snaps) {
    const panel = document.getElementById('statsPanel');
    panel.innerHTML = Object.values(snaps).map(s => {
        const spread = s.bestBid > 0 && s.bestAsk > 0 ? (s.bestAsk - s.bestBid).toFixed(2) : '-';
        return `<div style="margin-bottom:8px;">
            <div style="font-weight:600;color:#4fc3f7;margin-bottom:2px;">${s.symbol} <span class="tag ${s.segment==='EQU'?'tag-equ':'tag-eqd'}">${s.segment}</span></div>
            <div class="stat-row"><span class="stat-label">Last Price</span><span class="stat-value">${fmt(s.lastPrice)}</span></div>
            <div class="stat-row"><span class="stat-label">Spread</span><span class="stat-value">${spread}</span></div>
            <div class="stat-row"><span class="stat-label">Volume</span><span class="stat-value">${s.volume || 0}</span></div>
            <div class="stat-row"><span class="stat-label">Trades</span><span class="stat-value">${s.tradeCount}</span></div>
            <div class="stat-row"><span class="stat-label">Bid Depth</span><span class="stat-value">${s.bidDepth}</span></div>
            <div class="stat-row"><span class="stat-label">Ask Depth</span><span class="stat-value">${s.askDepth}</span></div>
        </div>`;
    }).join('');
}

async function refreshBook() {
    const sym = document.getElementById('bookSymbol').value;
    try {
        const res = await fetch(API + '/orderbook/' + sym);
        const data = await res.json();

        const bidsDiv = document.getElementById('bookBids');
        const asksDiv = document.getElementById('bookAsks');

        const bids = data.bids || [];
        const asks = data.asks || [];
        const maxQty = Math.max(
            ...bids.map(b => b.qty || 0),
            ...asks.map(a => a.qty || 0),
            1
        );

        bidsDiv.innerHTML = '<h3>BIDS</h3>' + bids.map(b => {
            const w = Math.round((b.qty / maxQty) * 100);
            return `<div class="bar bar-bid" style="position:relative;">
                <div style="position:absolute;top:0;bottom:0;right:0;width:${w}%;background:rgba(76,175,80,0.15);border-radius:2px;"></div>
                <span style="z-index:1;margin-right:8px;" class="price-bid">${fmt(b.price)}</span>
                <span style="z-index:1;">${b.qty}</span>
            </div>`;
        }).join('');

        asksDiv.innerHTML = '<h3>ASKS</h3>' + asks.map(a => {
            const w = Math.round((a.qty / maxQty) * 100);
            return `<div class="bar bar-ask" style="position:relative;">
                <div style="position:absolute;top:0;bottom:0;left:0;width:${w}%;background:rgba(239,83,80,0.12);border-radius:2px;"></div>
                <span style="z-index:1;" class="price-ask">${fmt(a.price)}</span>
                <span style="z-index:1;margin-left:8px;">${a.qty}</span>
            </div>`;
        }).join('');
    } catch(e) {}
}

// ── Actions ────────────────────────────────────────────────────────

async function submitOrder(forceSide) {
    const side = forceSide || document.getElementById('fSide').value;
    document.getElementById('fSide').value = side;

    const body = {
        symbolIdx: document.getElementById('fSymbol').value,
        side: side,
        orderType: document.getElementById('fType').value,
        tif: document.getElementById('fTif').value,
        price: document.getElementById('fPrice').value,
        quantity: document.getElementById('fQty').value,
    };

    await fetch(API + '/order/new', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
    });
    refreshData();
}

async function cancelOrder(orderId) {
    await fetch(API + '/order/cancel', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({orderId}),
    });
    refreshData();
}

async function sessionAction(action) {
    await fetch(API + '/session/' + action, {method: 'POST'});
    refreshData();
}

// ── Init ───────────────────────────────────────────────────────────

connect();
refreshData();
setInterval(refreshData, 5000);
</script>
</body>
</html>

<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><title>EuNEx CH Login</title>
<style>
body{background:#0a0e27;color:#e0e0e0;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.card{background:#131835;border:1px solid #2a2f5a;border-radius:12px;padding:40px;width:340px}
h2{color:#00d4aa;margin-top:0;text-align:center}
label{display:block;margin:12px 0 4px;color:#8890b5}
input{width:100%;padding:10px;background:#1a1f45;border:1px solid #2a2f5a;border-radius:6px;color:#e0e0e0;box-sizing:border-box}
button{width:100%;padding:12px;background:#00d4aa;color:#0a0e27;border:none;border-radius:6px;cursor:pointer;font-weight:600;margin-top:20px;font-size:15px}
button:hover{background:#00b894}
.error{color:#ff6b6b;text-align:center;margin-top:10px}
.hint{color:#5a6088;font-size:12px;text-align:center;margin-top:15px}
</style></head><body>
<div class="card">
<h2>Clearing House Login</h2>
<form method="POST">
<label>Member ID</label><input name="member_id" placeholder="MBR01" required>
<label>Password</label><input name="password" type="password" required>
<button type="submit">Login</button>
</form>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<div class="hint">Password = member_id lowercase (e.g. mbr01)</div>
</div></body></html>
